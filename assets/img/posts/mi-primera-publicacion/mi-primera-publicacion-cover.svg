<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Portada Mi primera publicacion</title>
  <desc id="desc">Ilustracion con bloques y texto BC y Copilot para usar como imagen de portada del post.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#0b3b66" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ecfeff" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1060" cy="90" r="72" fill="#22c55e" fill-opacity="0.9" />
  <circle cx="120" cy="540" r="90" fill="#38bdf8" fill-opacity="0.35" />
  <rect x="110" y="120" width="980" height="390" rx="28" fill="url(#card)" fill-opacity="0.95" />
  <rect x="160" y="180" width="440" height="56" rx="12" fill="#0f172a" fill-opacity="0.08" />
  <rect x="160" y="258" width="600" height="20" rx="10" fill="#0f172a" fill-opacity="0.12" />
  <rect x="160" y="292" width="520" height="20" rx="10" fill="#0f172a" fill-opacity="0.12" />
  <rect x="160" y="326" width="560" height="20" rx="10" fill="#0f172a" fill-opacity="0.12" />
  <rect x="160" y="376" width="200" height="52" rx="14" fill="#0ea5e9" fill-opacity="0.9" />
  <text x="160" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#0f172a">BC y Copilot</text>
  <text x="160" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" fill="#e0f2fe">Mi primera publicacion</text>
  <text x="830" y="460" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a" fill-opacity="0.75">Daniel Zafon</text>
</svg>
